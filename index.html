<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no" />
  <title>Daily Blessings</title>

  <link rel="apple-touch-icon" href="icons/apple-touch-icon.png" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Blessings" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="theme-color" content="#17110a" />
  <link rel="manifest" href="manifest.json" />
  <link rel="icon" href="icons/icon-192.png" />

  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      height: 100%;
      font-family: Georgia, "Segoe UI", serif;
      background: radial-gradient(circle at 50% 25%, #3a2a12 0%, #17110a 75%);
      color: #fff6e0;
      overflow: hidden;
      -webkit-user-select: none;
      user-select: none;
      -webkit-tap-highlight-color: transparent;
    }
    .wrap {
      height: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 8vw;
      text-align: center;
      gap: 5vh;
    }
    .icon {
      font-size: 14vw;
      filter: drop-shadow(0 0 20px rgba(255, 210, 120, 0.6));
      animation: glow 3s ease-in-out infinite;
    }
    @keyframes glow {
      0%, 100% { filter: drop-shadow(0 0 12px rgba(255, 210, 120, 0.45)); }
      50% { filter: drop-shadow(0 0 28px rgba(255, 210, 120, 0.85)); }
    }
    #blessing {
      font-size: 6.5vw;
      line-height: 1.5;
      font-weight: 500;
      color: #fff6e0;
      text-shadow: 0 0 24px rgba(255, 210, 120, 0.35);
      max-width: 90vw;
      opacity: 0;
      transform: translateY(10px) scale(0.97);
      transition: opacity 0.45s ease, transform 0.45s ease;
    }
    #blessing.show {
      opacity: 1;
      transform: translateY(0) scale(1);
    }
    #hint {
      font-size: 4vw;
      color: #c9a86a;
      letter-spacing: 1px;
      text-transform: uppercase;
      opacity: 0.85;
    }
    .ripple {
      position: fixed;
      border-radius: 50%;
      background: rgba(255, 210, 120, 0.25);
      pointer-events: none;
      transform: translate(-50%, -50%) scale(0);
      animation: ripple-anim 0.6s ease-out forwards;
    }
    @keyframes ripple-anim {
      to { transform: translate(-50%, -50%) scale(1); opacity: 0; }
    }
    .overlay {
      position: fixed;
      inset: 0;
      background: rgba(10, 7, 3, 0.9);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 10;
      padding: 8vw;
      text-align: center;
    }
    .overlay.show { display: flex; }
    .about-card h2 {
      font-size: 6vw;
      margin-bottom: 3vh;
      color: #ffd27a;
    }
    .about-card p {
      font-size: 4.2vw;
      line-height: 1.6;
      margin-bottom: 1vh;
    }
    .about-card .site {
      color: #c9a86a;
      letter-spacing: 1px;
    }
    #categoryBar {
      position: fixed;
      top: max(env(safe-area-inset-top), 10px);
      left: 10px;
      right: 10px;
      z-index: 5;
      display: flex;
      flex-wrap: nowrap;
      overflow-x: auto;
      gap: 6px;
      padding: 2px 2px 6px;
      -webkit-overflow-scrolling: touch;
    }
    #categoryBar::-webkit-scrollbar { display: none; }
    .cat-btn {
      flex: 0 0 auto;
      display: flex;
      align-items: center;
      gap: 4px;
      padding: 6px 10px;
      border-radius: 999px;
      background: rgba(255, 210, 120, 0.08);
      border: 1px solid rgba(255, 210, 120, 0.28);
      color: #e8c98a;
      font-family: Georgia, serif;
      font-size: 11px;
      letter-spacing: 0.3px;
      white-space: nowrap;
    }
    .cat-btn .em { font-size: 13px; }
    .cat-btn.active {
      background: rgba(255, 210, 120, 0.28);
      border-color: #ffd27a;
      color: #fff6e0;
      box-shadow: 0 0 12px rgba(255, 210, 120, 0.5);
    }
    .cat-btn.version-chip {
      background: transparent;
      border-color: rgba(255, 210, 120, 0.18);
      color: #8a7658;
      font-size: 10px;
    }
    #categoryLabel {
      font-size: 3.2vw;
      color: #c9a86a;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      opacity: 0.9;
    }
    #actionBar {
      position: fixed;
      bottom: max(env(safe-area-inset-bottom), 18px);
      left: 50%;
      transform: translateX(-50%);
      z-index: 5;
      display: flex;
      gap: 10px;
    }
    .action-btn {
      padding: 10px 22px;
      border-radius: 999px;
      background: rgba(255, 210, 120, 0.12);
      border: 1px solid rgba(255, 210, 120, 0.4);
      color: #ffd27a;
      font-family: Georgia, serif;
      font-size: 3.4vw;
      letter-spacing: 1px;
      text-transform: uppercase;
      white-space: nowrap;
    }
    #copyToast {
      position: fixed;
      bottom: calc(max(env(safe-area-inset-bottom), 18px) + 46px);
      left: 50%;
      transform: translateX(-50%) translateY(10px);
      z-index: 6;
      padding: 8px 18px;
      border-radius: 999px;
      background: rgba(255, 210, 120, 0.9);
      color: #17110a;
      font-size: 3.4vw;
      font-weight: 600;
      white-space: nowrap;
      opacity: 0;
      transition: opacity 0.3s ease, transform 0.3s ease;
      pointer-events: none;
    }
    #copyToast.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }
  </style>
</head>
<body>
  <div id="categoryBar"></div>

  <div class="wrap">
    <div class="icon">&#10024;</div>
    <div id="categoryLabel"></div>
    <div id="blessing"></div>
    <div id="hint">Tap anywhere for a blessing</div>
  </div>

  <div id="actionBar">
    <button id="copyBtn" class="action-btn">Copy</button>
    <button id="messageBtn" class="action-btn">Text It</button>
  </div>
  <div id="copyToast">Copied!</div>

  <div class="overlay" id="aboutOverlay">
    <div class="about-card">
      <h2>Daily Blessings</h2>
      <p>Programmed by <strong>LASER GOD</strong></p>
      <p class="site">WWW.BARUKH.COM</p>
      <p style="margin-top: 3vh; opacity: 0.7; font-size: 3.6vw;">Tap anywhere to close</p>
    </div>
  </div>

  <script src="blessings-data.js"></script>
  <script>
    var APP_VERSION = 'v1.2';
    var DATA = window.BLESSINGS_DATA;
    var CATEGORIES = window.BLESSINGS_CATEGORIES;
    var CONTENT_IDS = CATEGORIES.filter(function (c) { return c.id !== 'random'; }).map(function (c) { return c.id; });

    var blessingEl = document.getElementById('blessing');
    var hintEl = document.getElementById('hint');
    var categoryLabelEl = document.getElementById('categoryLabel');
    var categoryBarEl = document.getElementById('categoryBar');
    var aboutOverlay = document.getElementById('aboutOverlay');
    var currentCategory = CATEGORIES[0].id;
    var currentText = '';
    var lastIndex = -1;
    var lastTapTime = 0;
    var TAP_COOLDOWN_MS = 1000;

    function pickCategoryId() {
      if (currentCategory === 'random') {
        return CONTENT_IDS[Math.floor(Math.random() * CONTENT_IDS.length)];
      }
      return currentCategory;
    }

    function nextBlessing() {
      var catId = pickCategoryId();
      var list = DATA[catId];
      var i;
      do { i = Math.floor(Math.random() * list.length); }
      while (i === lastIndex && list.length > 1);
      lastIndex = i;
      return list[i];
    }

    function showBlessing(x, y) {
      hintEl.style.opacity = '0';
      blessingEl.classList.remove('show');
      setTimeout(function () {
        currentText = nextBlessing();
        blessingEl.textContent = currentText;
        blessingEl.classList.add('show');
      }, 180);

      var r = document.createElement('div');
      r.className = 'ripple';
      var size = Math.max(window.innerWidth, window.innerHeight) * 1.4;
      r.style.width = size + 'px';
      r.style.height = size + 'px';
      r.style.left = x + 'px';
      r.style.top = y + 'px';
      document.body.appendChild(r);
      r.addEventListener('animationend', function () { r.remove(); });

      if (window.navigator && window.navigator.vibrate) {
        window.navigator.vibrate(15);
      }
    }

    // Touch devices fire both 'touchstart' and a synthetic 'click' for the same
    // tap, which used to double-advance the blessing. A shared cooldown timestamp
    // collapses both events from one physical tap into a single blessing change.
    function handleScreenTap(x, y) {
      var now = Date.now();
      if (now - lastTapTime < TAP_COOLDOWN_MS) return;
      lastTapTime = now;
      showBlessing(x, y);
    }

    var INTERACTIVE_SELECTOR = '#aboutOverlay, #categoryBar, #actionBar';

    document.addEventListener('touchstart', function (e) {
      if (e.target.closest(INTERACTIVE_SELECTOR)) return;
      var t = e.touches[0];
      handleScreenTap(t.clientX, t.clientY);
    }, { passive: true });

    document.addEventListener('click', function (e) {
      if (e.target.closest(INTERACTIVE_SELECTOR)) return;
      handleScreenTap(e.clientX, e.clientY);
    });

    aboutOverlay.addEventListener('click', function (e) {
      e.stopPropagation();
      aboutOverlay.classList.remove('show');
    });

    function renderCategoryBar() {
      categoryBarEl.innerHTML = '';

      CATEGORIES.forEach(function (cat) {
        var btn = document.createElement('button');
        btn.className = 'cat-btn' + (cat.id === currentCategory ? ' active' : '');
        btn.dataset.id = cat.id;
        btn.innerHTML = '<span class="em">' + cat.icon + '</span><span>' + cat.label + '</span>';
        btn.addEventListener('click', function (e) {
          e.stopPropagation();
          currentCategory = cat.id;
          renderCategoryBar();
          categoryLabelEl.textContent = cat.label;
          lastIndex = -1;
          showBlessing(window.innerWidth / 2, window.innerHeight / 2);
        });
        categoryBarEl.appendChild(btn);
      });

      var aboutChip = document.createElement('button');
      aboutChip.className = 'cat-btn';
      aboutChip.innerHTML = '<span class="em">&#8505;</span><span>About</span>';
      aboutChip.addEventListener('click', function (e) {
        e.stopPropagation();
        aboutOverlay.classList.add('show');
      });
      categoryBarEl.appendChild(aboutChip);

      var versionChip = document.createElement('div');
      versionChip.className = 'cat-btn version-chip';
      versionChip.textContent = APP_VERSION;
      categoryBarEl.appendChild(versionChip);
    }

    renderCategoryBar();
    categoryLabelEl.textContent = CATEGORIES[0].label;

    var copyBtn = document.getElementById('copyBtn');
    var messageBtn = document.getElementById('messageBtn');
    var copyToast = document.getElementById('copyToast');
    var copyToastTimer = null;

    function fallbackCopy(text) {
      var ta = document.createElement('textarea');
      ta.value = text;
      ta.style.position = 'fixed';
      ta.style.opacity = '0';
      document.body.appendChild(ta);
      ta.focus();
      ta.select();
      try { document.execCommand('copy'); } catch (err) {}
      document.body.removeChild(ta);
    }

    function copyText(text) {
      return new Promise(function (resolve) {
        if (window.navigator && window.navigator.clipboard && window.navigator.clipboard.writeText) {
          window.navigator.clipboard.writeText(text).then(resolve, function () {
            fallbackCopy(text);
            resolve();
          });
        } else {
          fallbackCopy(text);
          resolve();
        }
      });
    }

    function showToast(message) {
      copyToast.textContent = message;
      copyToast.classList.add('show');
      if (copyToastTimer) clearTimeout(copyToastTimer);
      copyToastTimer = setTimeout(function () { copyToast.classList.remove('show'); }, 1600);
    }

    copyBtn.addEventListener('click', function (e) {
      e.stopPropagation();
      if (!currentText) return;
      copyText(currentText).then(function () { showToast('Copied!'); });
    });

    messageBtn.addEventListener('click', function (e) {
      e.stopPropagation();
      if (!currentText) return;
      var text = currentText;
      copyText(text).then(function () {
        showToast('Copied — opening Messages…');
        setTimeout(function () {
          var isiOS = /iP(hone|od|ad)/.test(window.navigator.platform) ||
            (window.navigator.userAgent.indexOf('Mac') !== -1 && window.navigator.maxTouchPoints > 1);
          var url = (isiOS ? 'sms:&body=' : 'sms:?body=') + encodeURIComponent(text);
          window.location.href = url;
        }, 500);
      });
    });
  </script>
</body>
</html>
